<VirtualHost *:80>
        ServerAdmin parth@gmail.com
        ServerName demo.djangoapp.com
        DocumentRoot /var/www
        ProxyPreserveHost On
        ProxyPass / http://web:8000/
        ProxyPassReverse / http://web:8000/
        Alias /static /var/www/static
        <Directory /var/www/static>
                Require all granted
        </Directory>
        Alias /media /var/www/media
        <Directory /var/www/media>
                Require all granted
        </Directory>
        <Directory /var/www/mysite>
                <Files wsgi.py>
                        Require all granted
                </Files>
        </Directory>
        WSGIDaemonProcess djangoapp python-home=/var/www/env  python-path=/var/www
        WSGIProcessGroup djangoapp
        WSGIPassAuthorization On
        WSGIScriptAlias / /var/www/mysite/wsgi.py
</VirtualHost>
